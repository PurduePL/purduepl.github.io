name: Post Automation
on:
    issues:
        types:
            - opened

permissions:
    contents: write
    pull-requests: write
    issues: read

jobs:
    convert_news_to_pr:
        runs-on: ubuntu-latest
        if: contains(github.event.issue.labels.*.name, 'news')
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7
              with:
                fetch-depth: 0

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                enable-cache: true
                cache-dependency-glob: collections/uv.lock

            - name: Create PR for news post
              working-directory: ./collections
              run: |
                git config user.name "github-actions[bot]"
                git config user.email ""
                uv run python generate_post_from_issue.py ${{ github.event.issue.number }}
              env:
                GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    convert_member_to_pr:
        runs-on: ubuntu-latest
        if: contains(github.event.issue.labels.*.name, 'member')
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7
              with:
                fetch-depth: 0

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                enable-cache: true
                cache-dependency-glob: collections/uv.lock

            - name: Create PR for member addition
              working-directory: ./collections
              run: |
                git config user.name "github-actions[bot]"
                git config user.email ""
                uv run python generate_member_from_issue.py ${{ github.event.issue.number }}
              env:
                GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
